<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,follow">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#060A14">
  <title>Page Not Found — GuardPoint Group</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Inter:wght@400;500&display=swap" onload="this.rel='stylesheet';this.onload=null">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Inter:wght@400;500&display=swap"></noscript>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--accent:#F59E0B;--accent-md:#FBBF24;--navy:#0A1628;--font:'Inter',system-ui,sans-serif;--font-display:'Montserrat',system-ui,sans-serif}
    html{height:100%}
    body{font-family:var(--font);background:linear-gradient(150deg,#060A14 0%,#0A1628 55%,#0F1F3D 100%);color:#E8F0FC;min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;-webkit-font-smoothing:antialiased}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,0.022) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.022) 1px,transparent 1px);background-size:48px 48px;pointer-events:none}
    .wrap{position:relative;z-index:1;max-width:480px}
    .shield{margin:0 auto 2rem}
    .code{font-family:var(--font-display);font-size:clamp(5rem,18vw,7rem);font-weight:800;line-height:1;color:var(--accent-md);letter-spacing:-.02em;margin-bottom:.5rem}
    h1{font-family:var(--font-display);font-size:clamp(1.4rem,4vw,1.9rem);font-weight:700;color:#fff;letter-spacing:-.01em;margin-bottom:.75rem}
    p{font-family:var(--font);color:rgba(255,255,255,0.68);line-height:1.75;font-size:1rem;margin-bottom:2.25rem}
    .actions{display:flex;gap:.875rem;justify-content:center;flex-wrap:wrap}
    .btn-primary{font-family:var(--font-display);display:inline-flex;align-items:center;gap:.45rem;padding:.8rem 1.75rem;background:var(--accent);color:#0A1628;border-radius:8px;font-size:.9rem;font-weight:700;text-decoration:none;transition:background .18s,transform .18s;min-height:44px}
    .btn-primary:hover{background:#D97706;transform:translateY(-1px);color:#fff}
    .btn-secondary{font-family:var(--font-display);display:inline-flex;align-items:center;gap:.45rem;padding:.8rem 1.75rem;background:transparent;color:rgba(255,255,255,0.8);border:1.5px solid rgba(255,255,255,0.22);border-radius:8px;font-size:.9rem;font-weight:600;text-decoration:none;transition:color .18s,background .18s,border-color .18s;min-height:44px}
    .btn-secondary:hover{color:#fff;background:rgba(255,255,255,0.07);border-color:rgba(255,255,255,0.4)}
    :focus-visible{outline:3px solid var(--accent-md);outline-offset:3px;border-radius:4px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="shield" aria-hidden="true">
      <svg width="72" height="72" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M30 57 C30 57 52 46 52 30 V13 L30 3 L8 13 V30 C8 46 30 57 30 57 Z" fill="#0A1628" stroke="#F59E0B" stroke-width="2.5" stroke-linejoin="round" opacity="0.55"/>
        <path d="M22 27 V21 Q22 14 30 14 Q38 14 38 21 V27" stroke="#FBBF24" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.55"/>
        <rect x="17" y="25" width="26" height="18" rx="4.5" fill="#FBBF24" opacity="0.55"/>
        <circle cx="30" cy="33" r="3.2" fill="#0A1628"/>
        <rect x="28.7" y="33" width="2.6" height="5.5" rx="1.3" fill="#0A1628"/>
      </svg>
    </div>
    <div class="code" aria-label="Error 404">404</div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist or has been moved.<br>Let's get you back on track.</p>
    <div class="actions">
      <a href="/" class="btn-primary">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
        Go Home
      </a>
      <a href="/#contact" class="btn-secondary">Contact Us</a>
    </div>
  </div>
</body>
</html>
